<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header__logo">
    <svg class="logo-svg" viewBox="0 0 40 26"><path d="M32 26H8a8 8 0 01-1.5-15.85 10 10 0 0119.44-2.4A6 6 0 0132 26z"/></svg>
    <span class="logo-text">Sound<span>Wave</span></span>
  </a>

  <div class="header__search">
    <svg class="search-icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <input type="text" id="search-input" placeholder="Поиск треков и исполнителей">
  </div>

  <nav class="header__nav">
    <a href="index.html" class="nav-link active">Главная</a>
    <a href="playlists.html" class="nav-link">Плейлисты</a>
    <a href="albums.html" class="nav-link">Альбомы</a>
    <a href="stats.html" class="nav-link">Статистика</a>
    <a href="about.html" class="nav-link">О проекте</a>
  </nav>

  <a href="form.html" class="header__upload-btn">+ Загрузить</a>
</header>

<main class="main">
  <div class="section-title">Все треки</div>

  <div class="filters">
    <button class="filter-btn active" data-genre="all">Все</button>
    <button class="filter-btn" data-genre="Lo-Fi">Lo-Fi</button>
    <button class="filter-btn" data-genre="Electronic">Electronic</button>
    <button class="filter-btn" data-genre="Jazz">Jazz</button>
    <button class="filter-btn" data-genre="Ambient">Ambient</button>
    <button class="filter-btn" data-genre="Rock">Rock</button>
    <button class="filter-btn" data-genre="Acoustic">Acoustic</button>
  </div>

  <div class="track-counter" id="track-counter"></div>
  <div id="tracks-container"></div>
</main>

<div class="player-bar">
  <div class="player-left">
    <div class="player-art"><div id="player-art-color"></div></div>
    <div class="player-track-text">
      <div class="player-track-title" id="player-title">Выберите трек</div>
      <div class="player-track-artist" id="player-artist">——</div>
    </div>
  </div>
  <div class="player-center">
    <div class="player-buttons">
      <button class="ctrl-btn" id="btn-shuffle" title="Перемешать"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
      <button class="ctrl-btn" id="btn-prev" title="Предыдущий"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="ctrl-btn ctrl-btn--play" id="btn-play" title="Воспроизвести / Пауза"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="ctrl-btn" id="btn-next" title="Следующий"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      <button class="ctrl-btn" id="btn-repeat" title="Повтор"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
    </div>
    <div class="player-progress-wrap">
      <span class="player-time" id="player-cur">0:00</span>
      <div class="player-waveform" id="player-waveform"></div>
      <span class="player-time right" id="player-dur">0:00</span>
    </div>
  </div>
  <div class="player-right">
    <button class="ctrl-btn ctrl-btn--vol" title="Громкость"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
    <input type="range" class="volume-slider" id="vol-slider" min="0" max="100" value="80">
  </div>
</div>

<script src="../js/icons.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/playlists.js"></script>
<script src="../js/player.js"></script>
<script src="../js/playerbar.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
