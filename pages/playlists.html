<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave — Плейлисты</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header__logo">
    <svg class="logo-svg" viewBox="0 0 40 26"><path d="M32 26H8a8 8 0 01-1.5-15.85 10 10 0 0119.44-2.4A6 6 0 0132 26z"/></svg>
    <span class="logo-text">Sound<span>Wave</span></span>
  </a>
  <nav class="header__nav">
    <a href="index.html" class="nav-link">Главная</a>
    <a href="playlists.html" class="nav-link active">Плейлисты</a>
    <a href="albums.html" class="nav-link">Альбомы</a>
    <a href="stats.html" class="nav-link">Статистика</a>
    <a href="about.html" class="nav-link">О проекте</a>
  </nav>
  <a href="form.html" class="header__upload-btn">+ Загрузить</a>
</header>

<div class="collection-page">

  <div id="pl-grid">
    <div class="collection-header">
      <div class="section-title section-title--inline">Плейлисты</div>
      <button class="btn btn--orange btn--sm" id="btn-new-pl">+ Создать плейлист</button>
    </div>
    <div class="cards-grid" id="pl-grid-cards"></div>
  </div>

  <div id="pl-detail" hidden>
    <div class="collection-header">
      <button class="btn btn--ghost btn--sm" id="btn-back-pl">← Назад</button>
      <div class="collection-header__center">
        <h2 class="collection-detail-title" id="pl-detail-title"></h2>
        <span class="collection-detail-meta" id="pl-track-count"></span>
        <p class="collection-detail-desc" id="detail-desc" hidden></p>
      </div>
      <div class="collection-header__actions">
        <button class="btn btn--ghost btn--sm" id="btn-edit-pl">✏ Редактировать</button>
        <button class="btn btn--orange btn--sm" id="btn-add-tracks-pl">+ Добавить треки</button>
        <button class="btn btn--ghost btn--sm btn--danger" id="btn-del-pl">Удалить</button>
      </div>
    </div>
    <div class="collection-detail-cover-row">
      <div class="collection-detail-cover" id="detail-cover"></div>
    </div>
    <div id="pl-tracks"></div>
  </div>

</div>

<div class="player-bar">
  <div class="player-left">
    <div class="player-art"><div id="player-art-color"></div></div>
    <div class="player-track-text">
      <div class="player-track-title" id="player-title">Выберите трек</div>
      <div class="player-track-artist" id="player-artist">——</div>
    </div>
  </div>
  <div class="player-center">
    <div class="player-buttons">
      <button class="ctrl-btn" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
      <button class="ctrl-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="ctrl-btn ctrl-btn--play" id="btn-play"><svg viewBox="0 0 24 24" class="icon-play-svg"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="ctrl-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
      <button class="ctrl-btn" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
    </div>
    <div class="player-progress-wrap">
      <span class="player-time" id="player-cur">0:00</span>
      <div class="player-waveform" id="player-waveform"></div>
      <span class="player-time right" id="player-dur">0:00</span>
    </div>
  </div>
  <div class="player-right">
    <button class="ctrl-btn ctrl-btn--vol"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
    <input type="range" class="volume-slider" id="vol-slider" min="0" max="100" value="80">
  </div>
</div>

<script src="../js/icons.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/playlists.js"></script>
<script src="../js/player.js"></script>
<script src="../js/playerbar.js"></script>
<script src="../js/collection-page.js"></script>
</body>
</html>
